name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Design compliance
        run: npm run audit:design:check

      - name: Design compliance (changed files)
        if: github.event_name == 'pull_request'
        run: npm run audit:ui:changed -- --check --base=origin/${{ github.base_ref }}

      - name: Production build
        run: npm run build

      - name: Bundle budget
        run: npm run budget
