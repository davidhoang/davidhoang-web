name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      # astro check currently reports pre-existing errors in files outside
      # the scope of this workflow's test suite. Surface them here without
      # failing the build so new errors are visible in PRs.
      - name: Typecheck (astro check)
        run: npm run typecheck
        continue-on-error: true

      - name: Build
        run: npm run build
